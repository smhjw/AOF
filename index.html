<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOF: Always Out for Food - 贪吃蛇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="game-container">
            <h1>AOF</h1>
            <p class="subtitle">Always Out for Food (永远在觅食)</p>

            <div class="stats-board">
                <div class="stat">
                    <span class="stat-icon">🍎</span>
                    <span class="stat-label">分数</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">📏</span>
                    <span class="stat-label">长度</span>
                    <span class="stat-value" id="lengthDisplay">3</span>
                </div>
            </div>

            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <br>
            <button id="restartBtn" style="display: none;">重新开始</button>
            <div class="rogue-entry">
                <a href="rogue.html" class="rogue-btn">🔥 体验全新 ROGUE 武装模式 →</a>
            </div>
        </div>

        <div class="leaderboard-container">
            <h2>🏆 排行榜</h2>
            <ul id="leaderboardList">
                <!-- 排行榜数据将通过 JS 动态生成 -->
            </ul>
            <button id="clearBoardBtn" class="small-btn">清空记录</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
